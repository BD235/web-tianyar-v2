name: Keep Supabase Alive

on:
  schedule:
    # Berjalan setiap hari Senin dan Kamis jam 00:00 UTC (untuk mencegah Supabase paused setelah 7 hari tidak aktif)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Memungkinkan Anda menjalankannya secara manual dari tab Actions di GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/categories?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
